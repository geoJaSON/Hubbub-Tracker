<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="180" height="180" rx="28" fill="#0a1410"/>
  <rect x="6" y="6" width="168" height="168" rx="24" fill="none" stroke="#39ff14" stroke-width="2" opacity="0.35"/>
  <g fill="#39ff14" filter="url(#glow)" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-weight="700">
    <text x="28" y="118" font-size="86" letter-spacing="-4">&gt;_</text>
  </g>
  <rect x="118" y="78" width="22" height="38" fill="#39ff14" filter="url(#glow)">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
