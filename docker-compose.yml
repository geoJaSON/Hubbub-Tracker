# Hubbub Tracker — self-hosted all-in-one stack.
#   1. cp .env.example .env   (and set JWT_SECRET / ENCRYPTION_KEY)
#   2. docker compose up --build
#   3. open http://localhost:${APP_PORT:-3000}  — first account becomes admin.
services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: hubbub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hubbub}
      POSTGRES_DB: hubbub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hubbub -d hubbub"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
      build:
        context: .
      restart: unless-stopped
      depends_on:
        db:
          condition: service_healthy
      env_file:
        - .env
      environment:
        DATABASE_URL: postgres://hubbub:${POSTGRES_PASSWORD:-hubbub}@db:5432/hubbub
        NODE_ENV: production
        PORT: 8080
        BASE_PATH: /
        WEB_DIST: /app/artifacts/hubbub/dist/public
        UPLOADS_DIR: /data/uploads
      volumes:
        - uploads:/data/uploads
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.hubbub.rule=Host(`${HUBBUB_DOMAIN}`)"
        - "traefik.http.routers.hubbub.entrypoints=websecure"
        - "traefik.http.routers.hubbub.tls.certresolver=letsencrypt"
        - "traefik.http.services.hubbub.loadbalancer.server.port=8080"

volumes:
  pgdata:
  uploads:
