          nullable: true
        type:
          type: string
          enum: [item_created, item_status_changed, item_assigned, comment_added, commit_linked, message_posted, cost_added, decision_logged]
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    # ── Docs ──────────────────────────────────────────────────────────────
    Doc:
      type: object
