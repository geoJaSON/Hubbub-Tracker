        title:
          type: string
        slug:
          type: string
        body:
          type: string
        pinned:
          type: boolean
        order:
          type: integer
        createdById:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DocInput:
      type: object
