openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Hubbub team command-center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: users
  - name: projects
  - name: scopes
  - name: milestones
  - name: items
  - name: comments
  - name: commits
  - name: messages
  - name: time
  - name: costs
  - name: presence
  - name: standup
  - name: activity
  - name: docs
  - name: search
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Users ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin)
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAdminUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/setup:
    get:
      operationId: getAuthSetup
      tags: [users]
      summary: Returns whether the app has been initialized (first user exists)
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"

  /users/sync:
    post:
      operationId: syncUser
      tags: [users]
      summary: JIT-provision the current Clerk user (creates or returns existing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSync"
      responses:
        "200":
          description: Existing user returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "201":
          description: New user provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # ── Projects ───────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects the current user is a member of
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{slug}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{slug}/members:
    get:
      operationId: listProjectMembers
      tags: [projects]
      summary: List project members
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
    post:
      operationId: addProjectMember
      tags: [projects]
      summary: Add member to project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMemberInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMember"

  /projects/{slug}/members/{userId}:
    delete:
      operationId: removeProjectMember
      tags: [projects]
      summary: Remove member from project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  # ── Scopes ─────────────────────────────────────────────────────────────────
  /projects/{slug}/scopes:
    get:
      operationId: listScopes
      tags: [scopes]
      summary: List scopes for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scopes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scope"
    post:
      operationId: createScope
      tags: [scopes]
      summary: Create scope
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScopeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scope"

  /projects/{slug}/scopes/{scopeId}:
    patch:
      operationId: updateScope
      tags: [scopes]
      summary: Update scope
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: scopeId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScopeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scope"
    delete:
      operationId: deleteScope
      tags: [scopes]
      summary: Delete scope
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: scopeId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Milestones ─────────────────────────────────────────────────────────────
  /projects/{slug}/milestones:
    get:
      operationId: listMilestones
      tags: [milestones]
      summary: List milestones
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Create milestone
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /projects/{slug}/milestones/{milestoneId}:
    patch:
      operationId: updateMilestone
      tags: [milestones]
      summary: Update milestone
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: milestoneId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
    delete:
      operationId: deleteMilestone
      tags: [milestones]
      summary: Delete milestone
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: milestoneId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Items ──────────────────────────────────────────────────────────────────
  /projects/{slug}/items:
    get:
      operationId: listItems
      tags: [items]
      summary: List items for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      operationId: createItem
      tags: [items]
      summary: Create item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /projects/{slug}/items/{itemNumber}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get item by number
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDetail"
        "404":
          description: Not found
    patch:
      operationId: updateItem
      tags: [items]
      summary: Update item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Comments ───────────────────────────────────────────────────────────────
  /projects/{slug}/items/{itemNumber}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments on an item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Post a comment
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /projects/{slug}/items/{itemNumber}/comments/{commentId}:
    patch:
      operationId: updateComment
      tags: [comments]
      summary: Edit comment
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
        - in: path
          name: commentId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete comment
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
        - in: path
          name: commentId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Time Entries ───────────────────────────────────────────────────────────
  /projects/{slug}/items/{itemNumber}/time:
    get:
      operationId: listTimeEntries
      tags: [time]
      summary: List time entries for an item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Time entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeEntry"
    post:
      operationId: createTimeEntry
      tags: [time]
      summary: Log time on an item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimeEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"

  /projects/{slug}/time:
    get:
      operationId: listProjectTimeEntries
      tags: [time]
      summary: List all time entries for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Time entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeEntry"

  # ── Cost Entries ───────────────────────────────────────────────────────────
  /projects/{slug}/costs:
    get:
      operationId: listCostEntries
      tags: [costs]
      summary: List cost entries for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cost entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostEntry"
    post:
      operationId: createCostEntry
      tags: [costs]
      summary: Create cost entry
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CostEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEntry"

  /projects/{slug}/costs/{costId}:
    delete:
      operationId: deleteCostEntry
      tags: [costs]
      summary: Delete cost entry
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: costId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Commits ────────────────────────────────────────────────────────────────
  /projects/{slug}/commits:
    get:
      operationId: listCommits
      tags: [commits]
      summary: List commits for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Commits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commit"

  # ── Messages / Chat ────────────────────────────────────────────────────────
  /projects/{slug}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List recent messages
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: postMessage
      tags: [messages]
      summary: Post a chat message
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{slug}/messages/stream:
    get:
      operationId: streamMessages
      tags: [messages]
      summary: SSE stream of live project messages (text/event-stream)
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Server-Sent Events stream; each event is a JSON-encoded Message
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Unauthorized

  # ── Presence ───────────────────────────────────────────────────────────────
  /presence:
    get:
      operationId: listPresence
      tags: [presence]
      summary: List all team presence
      responses:
        "200":
          description: Presence list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Presence"
    put:
      operationId: upsertPresence
      tags: [presence]
      summary: Set my presence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Presence"

  # ── Standup ────────────────────────────────────────────────────────────────
  /standup:
    get:
      operationId: getStandup
      tags: [standup]
      summary: Get or generate standup for today
      responses:
        "200":
          description: Standup content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Standup"

  # ── Activity ───────────────────────────────────────────────────────────────
  /projects/{slug}/activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List activity events for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /activity/recent:
    get:
      operationId: listRecentActivity
      tags: [activity]
      summary: Recent cross-project activity
      responses:
        "200":
          description: Recent events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  # ── Docs ───────────────────────────────────────────────────────────────────
  /projects/{slug}/docs:
    get:
      operationId: listDocs
      tags: [docs]
      summary: List docs for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Docs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doc"
    post:
      operationId: createDoc
      tags: [docs]
      summary: Create doc
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doc"

  /projects/{slug}/docs/{docSlug}:
    get:
      operationId: getDoc
      tags: [docs]
      summary: Get doc by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: docSlug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Doc
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doc"
        "404":
          description: Not found
    patch:
      operationId: updateDoc
      tags: [docs]
      summary: Update doc
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: docSlug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doc"
    delete:
      operationId: deleteDoc
      tags: [docs]
      summary: Delete doc
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: docSlug
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Search ─────────────────────────────────────────────────────────────────
  /search:
    get:
      operationId: search
      tags: [search]
      summary: Full-text search across items and docs
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # ── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  /projects/{slug}/burn-down:
    get:
      operationId: getBurnDown
      tags: [dashboard]
      summary: Burn-down data for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Burn-down
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BurnDown"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SetupStatus:
      type: object
      required: [initialized]
      properties:
        initialized:
          type: boolean
          description: True if at least one user exists

    UserSync:
      type: object
      required: [email, displayName]
      properties:
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true

    # ── Users ──────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, clerkId, displayName, role, active]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: ["string", "null"]
        displayName:
          type: string
        username:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, member]
        hourlyRateCents:
          type: ["integer", "null"]
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [email, displayName]
      properties:
        email:
          type: string
        displayName:
          type: string
        username:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, member]
        hourlyRateCents:
          type: ["integer", "null"]

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        username:
          type: ["string", "null"]

    UserAdminUpdate:
      type: object
      properties:
        displayName:
          type: string
        role:
          type: string
          enum: [admin, member]
        hourlyRateCents:
          type: ["integer", "null"]
        active:
          type: boolean

    # ── Projects ─────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, name, slug, archived, hasGithubToken, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]
        hasGithubToken:
          type: boolean
        archived:
          type: boolean
        memberCount:
          type: integer
        openItemCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ProjectDetail:
      type: object
      required: [id, name, slug, archived, hasGithubToken, members, scopes, milestones, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]
        hasGithubToken:
          type: boolean
        archived:
          type: boolean
        members:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMember"
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/Scope"
        milestones:
          type: array
          items:
            $ref: "#/components/schemas/Milestone"
        createdAt:
