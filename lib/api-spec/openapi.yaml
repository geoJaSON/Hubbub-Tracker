openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Hubbub team command-center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: users
  - name: projects
  - name: scopes
  - name: milestones
  - name: items
  - name: comments
  - name: commits
  - name: messages
  - name: time
  - name: costs
  - name: presence
  - name: standup
  - name: activity
  - name: docs
  - name: search
  - name: dashboard
  - name: components
  - name: flows
  - name: attachments
  - name: notifications
  - name: dependencies
  - name: testing

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Users ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin)
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAdminUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/setup:
    get:
      operationId: getAuthSetup
      tags: [users]
      summary: Returns whether the app has been initialized (first user exists)
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"

  /users/sync:
    post:
      operationId: syncUser
      tags: [users]
      summary: JIT-provision the current Clerk user (creates or returns existing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSync"
      responses:
        "200":
          description: Existing user returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "201":
          description: New user provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # ── Projects ───────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects the current user is a member of
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{slug}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{slug}/members:
    get:
      operationId: listProjectMembers
      tags: [projects]
      summary: List project members
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
    post:
      operationId: addProjectMember
      tags: [projects]
      summary: Add member to project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMemberInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMember"

  /projects/{slug}/members/{userId}:
    delete:
      operationId: removeProjectMember
      tags: [projects]
      summary: Remove member from project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  # ── Scopes ─────────────────────────────────────────────────────────────────
  /projects/{slug}/scopes:
    get:
      operationId: listScopes
      tags: [scopes]
      summary: List scopes for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scopes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scope"
    post:
      operationId: createScope
      tags: [scopes]
      summary: Create scope
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScopeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scope"

  /projects/{slug}/scopes/{scopeId}:
    patch:
      operationId: updateScope
      tags: [scopes]
      summary: Update scope
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: scopeId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScopeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scope"
    delete:
      operationId: deleteScope
      tags: [scopes]
      summary: Delete scope
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: scopeId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Milestones ─────────────────────────────────────────────────────────────
  /projects/{slug}/milestones:
    get:
      operationId: listMilestones
      tags: [milestones]
      summary: List milestones
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Create milestone
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /projects/{slug}/milestones/{milestoneId}:
    patch:
      operationId: updateMilestone
      tags: [milestones]
      summary: Update milestone
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: milestoneId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
    delete:
      operationId: deleteMilestone
      tags: [milestones]
      summary: Delete milestone
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: milestoneId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Items ──────────────────────────────────────────────────────────────────
  /projects/{slug}/items:
    get:
      operationId: listItems
      tags: [items]
      summary: List items for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: includeClosed
          required: false
          schema:
            type: boolean
            default: true
          description: Include items with done or cancelled status.
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      operationId: createItem
      tags: [items]
      summary: Create item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /projects/{slug}/items/{itemNumber}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get item by number
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDetail"
        "404":
          description: Not found
    patch:
      operationId: updateItem
      tags: [items]
      summary: Update item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Comments ───────────────────────────────────────────────────────────────
  /projects/{slug}/items/{itemNumber}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments on an item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Post a comment
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /projects/{slug}/items/{itemNumber}/comments/{commentId}:
    patch:
      operationId: updateComment
      tags: [comments]
      summary: Edit comment
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
        - in: path
          name: commentId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete comment
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
        - in: path
          name: commentId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Dependencies ───────────────────────────────────────────────────────────
  /projects/{slug}/items/{itemNumber}/dependencies:
    post:
      operationId: addDependency
      tags: [dependencies]
      summary: Add a blocked-by dependency to an item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemDependencyInput"
      responses:
        "201":
          description: Created
        "409":
          description: Would create a cycle
        "422":
          description: An item cannot depend on itself

  /projects/{slug}/items/{itemNumber}/dependencies/{dependsOnItemNumber}:
    delete:
      operationId: removeDependency
      tags: [dependencies]
      summary: Remove a dependency from an item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
        - in: path
          name: dependsOnItemNumber
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Attachments ────────────────────────────────────────────────────────────
  # Upload (POST multipart) and download (GET binary) are handled out-of-band by
  # hand-written fetch helpers in the web app; only list + delete are generated.
  # entityType + entityId are path params (not query) so orval doesn't emit a
  # params type that would collide with the path-params const.
  /projects/{slug}/attachments/{entityType}/{entityId}:
    get:
      operationId: listAttachments
      tags: [attachments]
      summary: List attachments for an entity
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: entityType
          required: true
          schema:
            type: string
            enum: [item, comment, scope, message]
        - in: path
          name: entityId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"

  /projects/{slug}/attachments/{id}:
    delete:
      operationId: deleteAttachment
      tags: [attachments]
      summary: Delete an attachment
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Time Entries ───────────────────────────────────────────────────────────
  /projects/{slug}/items/{itemNumber}/time:
    get:
      operationId: listTimeEntries
      tags: [time]
      summary: List time entries for an item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Time entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeEntry"
    post:
      operationId: createTimeEntry
      tags: [time]
      summary: Log time on an item
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: itemNumber
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimeEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"

  /projects/{slug}/time:
    get:
      operationId: listProjectTimeEntries
      tags: [time]
      summary: List all time entries for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Time entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeEntry"

  # ── Cost Entries ───────────────────────────────────────────────────────────
  /projects/{slug}/costs:
    get:
      operationId: listCostEntries
      tags: [costs]
      summary: List cost entries for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cost entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostEntry"
    post:
      operationId: createCostEntry
      tags: [costs]
      summary: Create cost entry
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CostEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEntry"

  /projects/{slug}/costs/{costId}:
    patch:
      operationId: updateCostEntry
      tags: [costs]
      summary: Update cost entry
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: costId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CostEntryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEntry"
    delete:
      operationId: deleteCostEntry
      tags: [costs]
      summary: Delete cost entry
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: costId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Components ─────────────────────────────────────────────────────────────
  /projects/{slug}/components:
    get:
      operationId: listComponents
      tags: [components]
      summary: List project components
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Components
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectComponent"
    post:
      operationId: createComponent
      tags: [components]
      summary: Create project component
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectComponentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectComponent"

  /projects/{slug}/components/{componentId}:
    patch:
      operationId: updateComponent
      tags: [components]
      summary: Update project component
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: componentId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectComponentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectComponent"
    delete:
      operationId: deleteComponent
      tags: [components]
      summary: Delete project component
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: componentId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Flows ──────────────────────────────────────────────────────────────────
  /projects/{slug}/flows:
    get:
      operationId: listFlows
      tags: [flows]
      summary: List flows
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Flows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Flow"
    post:
      operationId: createFlow
      tags: [flows]
      summary: Create flow
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlowInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"

  /projects/{slug}/flows/{flowId}:
    get:
      operationId: getFlow
      tags: [flows]
      summary: Get flow
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: flowId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
    patch:
      operationId: updateFlow
      tags: [flows]
      summary: Update flow
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: flowId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlowUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
    delete:
      operationId: deleteFlow
      tags: [flows]
      summary: Delete flow
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: flowId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Commits ────────────────────────────────────────────────────────────────
  /projects/{slug}/commits:
    get:
      operationId: listCommits
      tags: [commits]
      summary: List commits for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Commits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commit"

  # ── Messages / Chat ────────────────────────────────────────────────────────
  /projects/{slug}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List recent messages
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: postMessage
      tags: [messages]
      summary: Post a chat message
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{slug}/messages/stream:
    get:
      operationId: streamMessages
      tags: [messages]
      summary: SSE stream of live project messages (text/event-stream)
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Server-Sent Events stream; each event is a JSON-encoded Message
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Unauthorized

  # ── Presence ───────────────────────────────────────────────────────────────
  /presence:
    get:
      operationId: listPresence
      tags: [presence]
      summary: List all team presence
      responses:
        "200":
          description: Presence list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Presence"
    put:
      operationId: upsertPresence
      tags: [presence]
      summary: Set my presence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Presence"

  # ── Standup ────────────────────────────────────────────────────────────────
  /standup:
    get:
      operationId: getStandup
      tags: [standup]
      summary: Get or generate standup for today
      responses:
        "200":
          description: Standup content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Standup"

  # ── Activity ───────────────────────────────────────────────────────────────
  /projects/{slug}/activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List activity events for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /activity/recent:
    get:
      operationId: listRecentActivity
      tags: [activity]
      summary: Recent cross-project activity
      responses:
        "200":
          description: Recent events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  # ── Docs ───────────────────────────────────────────────────────────────────
  /projects/{slug}/docs:
    get:
      operationId: listDocs
      tags: [docs]
      summary: List docs for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Docs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doc"
    post:
      operationId: createDoc
      tags: [docs]
      summary: Create doc
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doc"

  /projects/{slug}/docs/{docSlug}:
    get:
      operationId: getDoc
      tags: [docs]
      summary: Get doc by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: docSlug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Doc
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doc"
        "404":
          description: Not found
    patch:
      operationId: updateDoc
      tags: [docs]
      summary: Update doc
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: docSlug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doc"
    delete:
      operationId: deleteDoc
      tags: [docs]
      summary: Delete doc
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: docSlug
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Search ─────────────────────────────────────────────────────────────────
  /search:
    get:
      operationId: search
      tags: [search]
      summary: Full-text search across items and docs
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # ── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  /projects/{slug}/burn-down:
    get:
      operationId: getBurnDown
      tags: [dashboard]
      summary: Burn-down data for a project
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Burn-down
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BurnDown"

  # ── Notifications ──────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current user
      parameters:
        - in: query
          name: unread
          required: false
          schema:
            type: boolean
        - in: query
          name: limit
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/unread-count:
    get:
      operationId: getUnreadCount
      tags: [notifications]
      summary: Count unread notifications
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCount"

  /notifications/read:
    post:
      operationId: markNotificationsRead
      tags: [notifications]
      summary: Mark notifications as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadInput"
      responses:
        "204":
          description: Marked read

  # ── Testing (per-project manual test plan) ─────────────────────────────────
  /projects/{slug}/testing:
    get:
      operationId: getTestPlan
      tags: [testing]
      summary: Get the project's full test plan (suites → cases → runs)
      description: >
        Returns every suite with its cases, and every case with its run history
        plus server-derived fields: `currentStatus` (the newest run's result, or
        `untested`), `lastTestedAt`, and the distinct `devices` it has run on.
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The test plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlan"

  /projects/{slug}/testing/import:
    post:
      operationId: importTestPlan
      tags: [testing]
      summary: Bulk-create suites and cases
      description: Suites (and their cases) are appended after any existing suites.
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestPlanImport"
      responses:
        "201":
          description: Imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanImportResult"

  /projects/{slug}/testing/suites:
    post:
      operationId: createTestSuite
      tags: [testing]
      summary: Create a test suite
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestSuiteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestSuite"

  /projects/{slug}/testing/suites/{suiteId}:
    patch:
      operationId: updateTestSuite
      tags: [testing]
      summary: Update a test suite
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: suiteId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestSuiteUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestSuite"
    delete:
      operationId: deleteTestSuite
      tags: [testing]
      summary: Delete a test suite (cascades to its cases and runs)
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: suiteId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{slug}/testing/suites/{suiteId}/cases:
    post:
      operationId: createTestCase
      tags: [testing]
      summary: Create a test case in a suite
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: suiteId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCaseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCase"

  /projects/{slug}/testing/cases/{caseId}:
    patch:
      operationId: updateTestCase
      tags: [testing]
      summary: Update a test case (may move it to another suite in the same project)
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: caseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCaseUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCase"
    delete:
      operationId: deleteTestCase
      tags: [testing]
      summary: Delete a test case (cascades to its runs)
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: caseId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{slug}/testing/cases/{caseId}/runs:
    post:
      operationId: createTestRun
      tags: [testing]
      summary: Log a test run against a case
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: caseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestRunInput"
      responses:
        "201":
          description: Logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"

  /projects/{slug}/testing/runs/{runId}:
    patch:
      operationId: updateTestRun
      tags: [testing]
      summary: Update a test run
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: runId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestRunUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
    delete:
      operationId: deleteTestRun
      tags: [testing]
      summary: Delete a test run
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: path
          name: runId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SetupStatus:
      type: object
      required: [initialized]
      properties:
        initialized:
          type: boolean
          description: True if at least one user exists

    UserSync:
      type: object
      required: [email, displayName]
      properties:
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true

    # ── Users ──────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, clerkId, displayName, role, active]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: ["string", "null"]
        displayName:
          type: string
        username:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, member]
        hourlyRateCents:
          type: ["integer", "null"]
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [email, displayName]
      properties:
        email:
          type: string
        displayName:
          type: string
        username:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, member]
        hourlyRateCents:
          type: ["integer", "null"]

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        username:
          type: ["string", "null"]

    UserAdminUpdate:
      type: object
      properties:
        displayName:
          type: string
        role:
          type: string
          enum: [admin, member]
        hourlyRateCents:
          type: ["integer", "null"]
        active:
          type: boolean

    # ── Projects ─────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, name, slug, archived, hasGithubToken, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]
        hasGithubToken:
          type: boolean
        archived:
          type: boolean
        memberCount:
          type: integer
        openItemCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ProjectDetail:
      type: object
      required: [id, name, slug, archived, hasGithubToken, members, scopes, milestones, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]
        hasGithubToken:
          type: boolean
        archived:
          type: boolean
        members:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMember"
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/Scope"
        milestones:
          type: array
          items:
            $ref: "#/components/schemas/Milestone"
        createdAt:
          type: string
          format: date-time

    ProjectInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]
        githubToken:
          type: ["string", "null"]
          description: "Write-only personal access token for private repo polling. Never returned in responses."
        archived:
          type: boolean

    ProjectMember:
      type: object
      required: [id, projectId, userId, role, user]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: string
        role:
          type: string
          enum: [owner, member]
        user:
          $ref: "#/components/schemas/User"

    ProjectMemberInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
        role:
          type: string
          enum: [owner, member]

    # ── Scopes ────────────────────────────────────────────────────────────
    Scope:
      type: object
      required: [id, projectId, name, slug, status, order]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        slug:
          type: string
        sow:
          type: ["string", "null"]
        budgetCents:
          type: ["integer", "null"]
        status:
          type: string
          enum: [planned, active, on_hold, complete]
        startDate:
          type: ["string", "null"]
          format: date
        targetDate:
          type: ["string", "null"]
          format: date
        order:
          type: integer
        spentCents:
          type: ["integer", "null"]

    ScopeInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        sow:
          type: ["string", "null"]
        budgetCents:
          type: ["integer", "null"]
        status:
          type: string
          enum: [planned, active, on_hold, complete]
        startDate:
          type: ["string", "null"]
        targetDate:
          type: ["string", "null"]

    ScopeUpdate:
      type: object
      properties:
        name:
          type: string
        sow:
          type: ["string", "null"]
        budgetCents:
          type: ["integer", "null"]
        status:
          type: string
          enum: [planned, active, on_hold, complete]
        startDate:
          type: ["string", "null"]
        targetDate:
          type: ["string", "null"]
        order:
          type: integer

    # ── Milestones ────────────────────────────────────────────────────────
    Milestone:
      type: object
      required: [id, scopeId, name, status, order, itemCount, doneCount, laborCents]
      properties:
        id:
          type: integer
        scopeId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
          format: date
        targetDate:
          type: ["string", "null"]
          format: date
        status:
          type: string
          enum: [open, complete]
        order:
          type: integer
        itemCount:
          type: integer
        doneCount:
          type: integer
        laborCents:
          type: integer
          description: Sum of (billable minutes × user hourly rate) for items linked to this milestone.

    MilestoneInput:
      type: object
      required: [scopeId, name]
      properties:
        scopeId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
          format: date
        targetDate:
          type: ["string", "null"]
          format: date

    MilestoneUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
          format: date
        targetDate:
          type: ["string", "null"]
          format: date
        status:
          type: string
          enum: [open, complete]
        order:
          type: integer

    # ── Items ─────────────────────────────────────────────────────────────
    Item:
      type: object
      required: [id, projectId, number, type, title, status, priority, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        number:
          type: integer
        type:
          type: string
          enum: [todo, bug, request, decision]
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [open, in_progress, blocked, done, cancelled]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        category:
          $ref: "#/components/schemas/ItemCategory"
          nullable: true
        assigneeId:
          type: ["string", "null"]
        assignee:
          $ref: "#/components/schemas/User"
          nullable: true
        scopeId:
          type: ["integer", "null"]
        milestoneId:
          type: ["integer", "null"]
        estimateMinutes:
          type: ["integer", "null"]
        dueDate:
          type: ["string", "null"]
          format: date
        decisionRationale:
          type: ["string", "null"]
        closedAt:
