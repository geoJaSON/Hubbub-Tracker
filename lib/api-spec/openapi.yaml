          enum: [item, doc]
        id:
          type: integer
        title:
          type: string
        projectSlug:
          type: string
        projectName:
          type: string
        snippet:
          type: ["string", "null"]
        number:
          type: ["integer", "null"]
        itemType:
          type: ["string", "null"]
        status:
          type: ["string", "null"]

    SearchResults:
      type: object
      required: [results, total]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultItem"
        total:
          type: integer

    # ── Dashboard ─────────────────────────────────────────────────────────
    Dashboard:
      type: object
      required: [projects, openItems, overdueItems, teamPresence, recentActivity]
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        openItems:
          type: integer
        overdueItems:
          type: integer
        itemsByStatus:
          type: object
          additionalProperties:
            type: integer
        teamPresence:
          type: array
          items:
            $ref: "#/components/schemas/Presence"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEvent"
        myOpenItems:
          type: array
          items:
            $ref: "#/components/schemas/DashboardActionItem"
        blockedItems:
          type: array
          items:
            $ref: "#/components/schemas/DashboardActionItem"
        dueSoonItems:
          type: array
          items:
            $ref: "#/components/schemas/DashboardActionItem"

    DashboardActionItem:
      allOf:
        - $ref: "#/components/schemas/Item"
        - type: object
          required: [projectSlug]
          properties:
            projectSlug:
              type: string

    BurnDownPoint:
      type: object
      required: [date, budgetCents, spentCents]
      properties:
        date:
          type: string
          format: date
        budgetCents:
          type: integer
        spentCents:
          type: integer
        label:
          type: ["string", "null"]

    BurnDown:
      type: object
      required: [totalBudgetCents, totalSpentCents, points, scopes]
      properties:
        totalBudgetCents:
          type: integer
        totalSpentCents:
          type: integer
          description: Direct cost entries only (does not include derived labor).
        totalLaborCents:
          type: integer
          description: Sum of (billable minutes × user hourly rate) across the project.
        points:
          type: array
          items:
            $ref: "#/components/schemas/BurnDownPoint"
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/ScopeBurnDown"

    ScopeBurnDown:
      type: object
      required: [scopeId, scopeName, budgetCents, spentCents]
      properties:
        scopeId:
          type: integer
        scopeName:
          type: string
        budgetCents:
          type: integer
        spentCents:
          type: integer
          description: Direct cost entries assigned to this scope (does not include labor).
        laborCents:
          type: integer
          description: Sum of (billable minutes × user hourly rate) for items linked to this scope.

    # ── Testing ────────────────────────────────────────────────────────────
    TestRunResult:
      type: string
      enum: [pass, fail, skip, blocked]
      description: The outcome of a single test run.

    TestCaseStatus:
      type: string
      enum: [pass, fail, skip, blocked, untested]
      description: A case's current status — its newest run's result, or `untested`.

    TestRun:
      type: object
      required: [id, caseId, result, testedAt, createdAt]
      properties:
        id:
          type: integer
        caseId:
          type: integer
        result:
          $ref: "#/components/schemas/TestRunResult"
        device:
          type: ["string", "null"]
          description: Free-form device label, e.g. "iPhone 14", "Pixel 7".
        note:
          type: ["string", "null"]
        testedAt:
          type: string
          format: date-time
        createdById:
          type: ["string", "null"]
          description: User id (clerkId) of whoever logged the run.
        createdAt:
          type: string
          format: date-time

    TestCase:
      type: object
      required: [id, suiteId, title, order, createdAt, updatedAt, runs, currentStatus, devices]
      properties:
        id:
          type: integer
        suiteId:
          type: integer
        code:
          type: ["string", "null"]
        title:
          type: string
        expected:
          type: ["string", "null"]
          description: The expected result / pass condition.
        owner:
          type: ["string", "null"]
        order:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        runs:
          type: array
          description: Run history, newest first.
          items:
            $ref: "#/components/schemas/TestRun"
        currentStatus:
          $ref: "#/components/schemas/TestCaseStatus"
        lastTestedAt:
          type: ["string", "null"]
          format: date-time
        devices:
          type: array
          description: Distinct devices this case has run on.
          items:
            type: string

    TestSuite:
      type: object
      required: [id, projectId, title, warn, order, createdAt, cases]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        code:
          type: ["string", "null"]
        title:
          type: string
        warn:
          type: boolean
          description: Marks a high-risk area.
        order:
          type: integer
        createdAt:
          type: string
          format: date-time
        cases:
          type: array
          items:
            $ref: "#/components/schemas/TestCase"

    TestPlan:
      type: object
      required: [suites]
      properties:
        suites:
          type: array
          items:
            $ref: "#/components/schemas/TestSuite"

    TestSuiteInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        code:
          type: ["string", "null"]
        warn:
          type: boolean

    TestSuiteUpdate:
      type: object
      properties:
        title:
          type: string
        code:
          type: ["string", "null"]
        warn:
          type: boolean
        order:
          type: integer

    TestCaseInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        code:
          type: ["string", "null"]
        expected:
          type: ["string", "null"]
        owner:
          type: ["string", "null"]

    TestCaseUpdate:
      type: object
      properties:
        title:
          type: string
        code:
          type: ["string", "null"]
        expected:
          type: ["string", "null"]
        owner:
          type: ["string", "null"]
        order:
          type: integer
        suiteId:
          type: integer
          description: Move the case to another suite in the same project.

    TestRunInput:
      type: object
      required: [result]
      properties:
        result:
          $ref: "#/components/schemas/TestRunResult"
        device:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        testedAt:
          type: string
          format: date-time
          description: Defaults to now when omitted.

    TestRunUpdate:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/TestRunResult"
        device:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        testedAt:
          type: string
          format: date-time

    TestPlanImport:
      type: object
      required: [suites]
      properties:
        suites:
          type: array
          items:
            type: object
            required: [title, cases]
            properties:
              code:
                type: string
              title:
                type: string
              warn:
                type: boolean
              cases:
                type: array
                items:
                  type: object
                  required: [title]
                  properties:
                    code:
                      type: string
                    title:
                      type: string
                    expected:
                      type: string
                    owner:
                      type: string

    TestPlanImportResult:
      type: object
      required: [ok, suites, cases]
      properties:
        ok:
          type: boolean
        suites:
          type: integer
          description: Number of suites created.
        cases:
          type: integer
          description: Number of cases created.
