          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]
        githubToken:
          type: ["string", "null"]
          description: "Write-only personal access token for private repo polling. Never returned in responses."
        archived:
          type: boolean

    ProjectMember:
      type: object
      required: [id, projectId, userId, role, user]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: string
        role:
          type: string
